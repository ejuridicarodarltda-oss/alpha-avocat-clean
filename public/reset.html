<!doctype html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Restablecer contraseña — Alpha Avocat</title>

<link rel="stylesheet" href="./style.css">

</head>


<body class="app-shell">


<header class="topbar">

<div class="brand">

<div class="brand-mark">A</div>

<div class="brand-text">

<div class="brand-title">ALPHA AVOCAT</div>

<div class="brand-sub">
Sistema de Gestión Jurídica Inteligente
</div>

</div>

</div>

</header>



<div class="layout">

<main class="main">


<section class="card" style="max-width:420px;margin:auto">

<h2 style="margin-bottom:16px">Restablecer contraseña</h2>

<p class="muted" style="margin-bottom:20px">
Ingrese su nueva contraseña.
</p>


<div class="field">

<label>Nueva contraseña</label>

<input type="password" id="password">

</div>


<div class="field" style="margin-top:10px">

<label>Confirmar contraseña</label>

<input type="password" id="password2">

</div>


<button id="btnReset" class="btn btn-3d btn-primary" style="margin-top:18px;width:100%">
Cambiar contraseña
</button>


<p id="msg" class="muted" style="margin-top:12px"></p>

</section>


</main>

</div>



<script type="module">

import { supabase } from "./app.js"


const btn = document.getElementById("btnReset")

const msg = document.getElementById("msg")



btn.addEventListener("click", async ()=>{

const p1 = document.getElementById("password").value

const p2 = document.getElementById("password2").value


if(!p1){

msg.textContent = "Debe ingresar contraseña"

return

}

if(p1 !== p2){

msg.textContent = "Las contraseñas no coinciden"

return

}


const { error } = await supabase.auth.updateUser({

password:p1

})


if(error){

msg.textContent = error.message

return

}


msg.textContent = "Contraseña actualizada correctamente"


setTimeout(()=>{

window.location.href = "./login.html"

},2000)

})

</script>


</body>
</html>
