<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agenda — Alpha Avocat</title>
<link rel="stylesheet" href="./style.css">
<style>
.agenda-page{
  margin:0;
  min-height:100dvh;
  background:#eef1f5;
  color:#0f172a;
  overflow:auto;
}

.agenda-page .topbar{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.agenda-page .brand h1{margin:0;font-size:20px;letter-spacing:1px;}

.agenda-nav{display:flex;gap:8px;flex-wrap:wrap;}
.agenda-nav a{
  color:white;
  text-decoration:none;
  font-weight:700;
  background:rgba(255,255,255,.16);
  border-radius:999px;
  padding:8px 12px;
}

.agenda-main{padding:18px;max-width:1100px;margin:0 auto 28px;}

.agenda-card{
  background:#fff;
  border-radius:14px;
  box-shadow:0 10px 24px rgba(15,23,42,.1);
  padding:16px;
}

.agenda-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

.agenda-head h2{margin:0;font-size:28px;}

.btn{
  border:none;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
  font-weight:700;
}

.btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;}
.btn-danger{background:linear-gradient(135deg,#ef4444,#b91c1c);color:#fff;}
.btn-ghost{background:#e2e8f0;color:#0f172a;}

.table-wrap{overflow-x:auto;}
.table{width:100%;border-collapse:collapse;}
.table th,.table td{padding:12px 10px;border-bottom:1px solid #e2e8f0;text-align:left;}
.table th{font-size:13px;text-transform:uppercase;color:#475569;letter-spacing:.4px;}

.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.45);
  display:none;
  align-items:center;
  justify-content:center;
  padding:14px;
  z-index:1000;
}
.modal-bg.show{display:flex;}

.modal-card{
  width:min(780px,100%);
  max-height:92dvh;
  overflow:auto;
  background:#fff;
  border-radius:16px;
  box-shadow:0 18px 45px rgba(0,0,0,.25);
  padding:16px;
}

.modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;}
.modal-close{cursor:pointer;font-size:22px;border:none;background:none;line-height:1;}

.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-weight:700;font-size:14px;}
.field input,.field select,.field textarea{
  border:1px solid #cbd5e1;
  border-radius:10px;
  padding:10px 11px;
  font-size:14px;
  width:100%;
}
.field textarea{min-height:88px;resize:vertical;}
.field-full{grid-column:1 / -1;}

.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px;flex-wrap:wrap;}

@media (max-width:900px){
  .agenda-main{padding:14px;}
  .agenda-head h2{font-size:24px;}
}

@media (max-width:700px){
  .form-grid{grid-template-columns:1fr;}
  .table thead{display:none;}
  .table,.table tbody,.table tr,.table td{display:block;width:100%;}
  .table tr{padding:10px 0;border-bottom:1px solid #e2e8f0;}
  .table td{border:none;padding:6px 0;}
  .table td::before{content:attr(data-label);font-weight:700;color:#475569;display:block;font-size:12px;text-transform:uppercase;}
}
</style>
</head>
<body class="agenda-page">
<header class="topbar">
  <div class="brand"><h1>ALPHA AVOCAT</h1></div>
  <nav class="agenda-nav">
    <a href="panel.html">Panel</a>
    <a href="clientes.html">Clientes</a>
    <a href="causas.html">Causas</a>
  </nav>
</header>

<main class="agenda-main">
  <section class="agenda-card">
    <div class="agenda-head">
      <h2>Agenda</h2>
      <button id="btnNew" class="btn btn-primary">Nuevo evento</button>
    </div>

    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Título</th>
            <th>Tipo</th>
            <th>Persona</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="eventsTable">
          <tr><td colspan="5">Cargando…</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</main>

<div id="modalBg" class="modal-bg">
  <div class="modal-card">
    <div class="modal-head">
      <strong>Nuevo evento</strong>
      <button class="modal-close" id="btnClose" aria-label="Cerrar modal">✕</button>
    </div>

    <div class="form-grid">
      <div class="field field-full">
        <label for="title">Título</label>
        <input id="title">
      </div>

      <div class="field">
        <label for="event_type">Tipo</label>
        <select id="event_type">
          <option value="consulta">Consulta</option>
          <option value="reunion">Reunión</option>
          <option value="audiencia">Audiencia</option>
          <option value="alegato">Alegato</option>
          <option value="plazo">Plazo</option>
        </select>
      </div>

      <div class="field">
        <label for="starts_at">Fecha</label>
        <input id="starts_at" type="datetime-local">
      </div>

      <div class="field">
        <label for="external_name">Persona</label>
        <input id="external_name">
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email">
      </div>

      <div class="field">
        <label for="phone">Teléfono</label>
        <input id="phone">
      </div>

      <div class="field">
        <label for="meeting_mode">Modalidad</label>
        <select id="meeting_mode">
          <option value="presencial">Presencial</option>
          <option value="videoconferencia">Videoconferencia</option>
        </select>
      </div>

      <div class="field">
        <label for="recording_authorized">Grabación autorizada</label>
        <select id="recording_authorized">
          <option value="true">Sí</option>
          <option value="false">No</option>
        </select>
      </div>

      <div class="field field-full">
        <label for="notes">Notas</label>
        <textarea id="notes"></textarea>
      </div>
    </div>

    <div class="modal-actions">
      <button id="btnCancel" class="btn btn-ghost">Cancelar</button>
      <button id="btnSave" class="btn btn-primary">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
import { supabase } from './app.js'

const table = document.getElementById('eventsTable')
const modalBg = document.getElementById('modalBg')

const btnNew = document.getElementById('btnNew')
const btnClose = document.getElementById('btnClose')
const btnCancel = document.getElementById('btnCancel')
const btnSave = document.getElementById('btnSave')

const titleEl = document.getElementById('title')
const typeEl = document.getElementById('event_type')
const externalNameEl = document.getElementById('external_name')
const emailEl = document.getElementById('email')
const phoneEl = document.getElementById('phone')
const meetingModeEl = document.getElementById('meeting_mode')
const recordingEl = document.getElementById('recording_authorized')
const startsEl = document.getElementById('starts_at')
const notesEl = document.getElementById('notes')

function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#039;'
  }[c]))
}

const { data: sess } = await supabase.auth.getSession()
if(!sess?.session){
  window.location.href = './login.html'
}

btnNew.onclick = () => modalBg.classList.add('show')
btnClose.onclick = closeModal
btnCancel.onclick = closeModal

function closeModal(){
  modalBg.classList.remove('show')
}

async function loadEvents(){
  const { data, error } = await supabase
    .from('appointments')
    .select('*')
    .order('starts_at',{ascending:true})

  if(error){
    table.innerHTML = `<tr><td colspan="5">Error al cargar eventos: ${escapeHtml(error.message)}</td></tr>`
    return
  }

  if(!data || data.length === 0){
    table.innerHTML = '<tr><td colspan="5">Sin eventos</td></tr>'
    return
  }

  table.innerHTML = data.map(e => `
    <tr>
      <td data-label="Fecha">${new Date(e.starts_at).toLocaleString()}</td>
      <td data-label="Título">${escapeHtml(e.title)}</td>
      <td data-label="Tipo">${escapeHtml(e.event_type)}</td>
      <td data-label="Persona">${escapeHtml(e.external_name)}</td>
      <td data-label="Acciones"><button class="btn btn-danger delete" data-id="${escapeHtml(e.id)}">Eliminar</button></td>
    </tr>
  `).join('')
}

table.addEventListener('click', async e => {
  if(!e.target.classList.contains('delete')) return

  const id = e.target.dataset.id

  if(!confirm('¿Eliminar evento?')) return

  await supabase
    .from('appointments')
    .delete()
    .eq('id',id)

  loadEvents()
})

btnSave.onclick = async () => {
  if(!startsEl.value){
    alert('Debes ingresar una fecha y hora')
    return
  }

  const fecha = new Date(startsEl.value)
  if(Number.isNaN(fecha.getTime())){
    alert('Fecha inválida')
    return
  }

  const payload = {
    title: titleEl.value,
    event_type: typeEl.value,
    external_name: externalNameEl.value || null,
    email: emailEl.value || null,
    phone: phoneEl.value || null,
    meeting_mode: meetingModeEl.value,
    recording_authorized: recordingEl.value === 'true',
    starts_at: fecha.toISOString(),
    notes: notesEl.value || null
  }

  const { error } = await supabase
    .from('appointments')
    .insert(payload)

  if(error){
    alert(error.message)
    return
  }

  closeModal()
  loadEvents()
}

loadEvents()
</script>
</body>
</html>
