<!doctype html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Causas — Alpha Avocat</title>

<link rel="stylesheet" href="./style.css">

</head>


<body class="app-shell">


<header class="topbar">

<div class="brand">

<div class="brand-mark">A</div>

<div class="brand-text">
<div class="brand-title">ALPHA AVOCAT</div>
<div class="brand-sub">Sistema de Gestión Jurídica Inteligente</div>
</div>

</div>


<div class="topbar-right">

<a class="btn btn-3d btn-secondary" href="./panel.html">
Panel
</a>

<a class="btn btn-3d btn-primary" href="./clientes.html">
Clientes
</a>

</div>

</header>



<div class="layout">


<aside class="sidebar">

<nav class="nav">

<a class="nav-item" href="./panel.html">Panel</a>

<a class="nav-item" href="./clientes.html">Clientes</a>

<a class="nav-item active" href="./causas.html">Causas</a>

<a class="nav-item" href="./agenda.html">Agenda</a>

</nav>

</aside>



<main class="main">



<section class="card">

<div class="card-head">

<h2 class="card-title">Causas registradas</h2>

</div>



<div class="table-wrap">

<table class="table">

<thead>

<tr>

<th>Rol</th>

<th>Tribunal</th>

<th>Cliente</th>

<th>Materia</th>

<th>Honorarios</th>

<th>Acciones</th>

</tr>

</thead>

<tbody id="causasTable">

<tr>

<td colspan="6">Cargando...</td>

</tr>

</tbody>

</table>

</div>

</section>

</main>

</div>



<script type="module">

import { supabase } from './app.js'


const tabla = document.getElementById("causasTable")


function formatoPesos(valor){

if(!valor) return ""

return new Intl.NumberFormat("es-CL",
{ style:"currency", currency:"CLP" }).format(valor)

}



async function cargarCausas(){

const { data , error } = await supabase
.from("cases")
.select("*")
.order("created_at",{ascending:false})

if(error){

tabla.innerHTML = "<tr><td colspan='6'>Error al cargar causas</td></tr>"
return

}

if(!data.length){

tabla.innerHTML = "<tr><td colspan='6'>Sin causas</td></tr>"
return

}

tabla.innerHTML = ""

data.forEach(causa=>{

const fila = document.createElement("tr")

fila.innerHTML = `

<td>${causa.case_number ?? ""}</td>

<td>${causa.court ?? ""}</td>

<td>${causa.client_name ?? ""}</td>

<td>${causa.matter ?? ""}</td>

<td>${formatoPesos(causa.fee_total)}</td>

<td>

<button class="btn btn-small delete" data-id="${causa.id}">
Eliminar
</button>

</td>

`

tabla.appendChild(fila)

})

}



document.addEventListener("click", async e=>{

if(e.target.classList.contains("delete")){

const id = e.target.dataset.id

if(confirm("Eliminar causa?")){

await supabase
.from("cases")
.delete()
.eq("id",id)

cargarCausas()

}

}

})


cargarCausas()

</script>


</body>
</html>
