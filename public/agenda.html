<script>

function openEventModal(){
  const modal = document.getElementById("eventModal");
  if(modal){
    modal.style.display = "flex";
  }
}

function closeEventModal(){
  const modal = document.getElementById("eventModal");
  if(modal){
    modal.style.display = "none";
  }
}

async function saveEvent(){

  const title = document.getElementById("event-title").value;
  const type = document.getElementById("event-type").value;
  const clientId = document.getElementById("client-id").value || null;
  const caseId = document.getElementById("case-id").value || null;
  const personName = document.getElementById("person-name").value || null;
  const notes = document.getElementById("event-notes").value || null;

  const dateValue = document.getElementById("event-date").value;

  let startsAt = null;

  if(dateValue){
    const d = new Date(dateValue);
    if(!isNaN(d.getTime())){
      startsAt = d.toISOString();
    }
  }

  const { data, error } = await supabase
  .from("appointments")
  .insert([
    {
      title: title,
      kind: type,
      starts_at: startsAt,
      client_id: clientId,
      case_id: caseId,
      person_name: personName,
      notes: notes
    }
  ]);

  if(error){
    console.error(error);
    alert("Error al guardar evento");
    return;
  }

  alert("Evento guardado");

  closeEventModal();

  location.reload();
}

</script>


<!-- MODAL NUEVO EVENTO -->

<div class="modal" id="eventModal" style="display:none;">

  <div class="modal-content">

    <span class="modal-close" onclick="closeEventModal()">✕</span>

    <h2>Nuevo Evento</h2>

    <form class="event-form">

      <label>Título</label>
      <input type="text" id="event-title" required>

      <label>Tipo</label>
      <select id="event-type">
        <option value="reunion">Reunión</option>
        <option value="consulta">Consulta</option>
        <option value="audiencia">Audiencia</option>
      </select>

      <label>Cliente</label>
      <select id="client-id">
        <option value="">(ninguno)</option>
      </select>

      <label>Causa</label>
      <select id="case-id">
        <option value="">(sin causa)</option>
      </select>

      <label>Persona si no es cliente</label>
      <input type="text" id="person-name">

      <label>Fecha y hora</label>
      <input type="datetime-local" id="event-date" required>

      <label>Notas</label>
      <textarea id="event-notes"></textarea>

      <div class="event-buttons">

        <button type="button" class="btn-cancel" onclick="closeEventModal()">
        Cancelar
        </button>

        <button type="button" class="btn-save" onclick="saveEvent()">
        Guardar
        </button>

      </div>

    </form>

  </div>

</div>
