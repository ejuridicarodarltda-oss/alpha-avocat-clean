<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ALPHA AVOCAT - Clientes</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<header>
  <h1>ALPHA AVOCAT</h1>
  <nav>
    <a href="panel.html">Panel</a>
    <a href="agenda.html">Agenda</a>
    <a href="causas.html">Causas</a>
    <a href="#" id="btnLogout">Cerrar sesión</a>
  </nav>
</header>

<main>
  <div class="card">
    <h2>Crear cliente</h2>

    <form id="clientForm">
      <label>Nombre completo / Razón social</label>
      <input id="full_name" required>

      <label>RUT</label>
      <input id="rut" placeholder="12.345.678-9">

      <label>Domicilio</label>
      <input id="address">

      <label>Teléfono</label>
      <input id="phone" placeholder="+56 9 XXXXXXXX">

      <label>Email</label>
      <input id="email" type="email" placeholder="correo@ejemplo.com">

      <label>Tipo</label>
      <select id="legal">
        <option value="false">Persona natural</option>
        <option value="true">Persona jurídica</option>
      </select>

      <button id="btnSaveClient" type="submit">Guardar</button>
    </form>

    <p id="msg" class="muted"></p>
  </div>

  <div class="card">
    <h2>Clientes</h2>
    <div id="list" class="muted">Cargando…</div>
  </div>
</main>

<script type="module">
  import { supabase } from "./app.js";

  const list = document.getElementById("list");
  const msg = document.getElementById("msg");
  const form = document.getElementById("clientForm");
  const btnSave = document.getElementById("btnSaveClient");
  const btnLogout = document.getElementById("btnLogout");

  function setMsg(t){ msg.textContent = t || ""; }
  function esc(s){ return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m])); }

  async function requireSession(){
    const { data } = await supabase.auth.getSession();
    if(!data?.session){ window.location.href = "login.html"; return false; }
    return true;
  }

  async function loadClients(){
    list.textContent = "Cargando…";

    const { data, error } = await supabase
      .from("clients")
      .select("id,full_name,rut,address,phone,email,is_legal_entity,created_at")
      .order("created_at",{ ascending:false })
      .limit(200);

    if(error){
      list.innerHTML = `<div class="error">Error al cargar clientes: ${esc(error.message)}</div>`;
      return;
    }

    if(!data || data.length===0){
      list.innerHTML = `<div class="muted">Sin clientes registrados</div>`;
      return;
    }

    list.innerHTML = data.map(c => `
      <div class="row" style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start">
        <div>
          <div><b>${esc(c.full_name)}</b> <span class="muted">${c.is_legal_entity ? "(PJ)" : "(PN)"}</span></div>
          <div class="muted">
            ${esc(c.rut||"")}
            ${c.phone ? " • " + esc(c.phone) : ""}
            ${c.email ? " • " + esc(c.email) : ""}
          </div>
          ${c.address ? `<div class="muted">${esc(c.address)}</div>` : ""}
        </div>

        <button class="btnDeleteClient" data-id="${c.id}" type="button">Eliminar</button>
      </div>
    `).join("");

    document.querySelectorAll(".btnDeleteClient").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        const id = btn.getAttribute("data-id");
        if(!confirm("¿Eliminar este cliente?")) return;

        const { error } = await supabase.from("clients").delete().eq("id", id);
        if(error){
          setMsg("Error al eliminar: " + error.message);
          return;
        }

        setMsg("Cliente eliminado ✅");
        loadClients();
      });
    });
  }

  form.addEventListener("submit", async (ev) => {
    ev.preventDefault();
    setMsg("");

    btnSave.disabled = true;
    btnSave.textContent = "Guardando…";

    try{
      const payload = {
        full_name: document.getElementById("full_name").value.trim(),
        rut: document.getElementById("rut").value.trim() || null,
        address: document.getElementById("address").value.trim() || null,
        phone: document.getElementById("phone").value.trim() || null,
        email: document.getElementById("email").value.trim() || null,
        is_legal_entity: document.getElementById("legal").value === "true"
      };

      if(!payload.full_name){
        setMsg("Falta el nombre del cliente.");
        return;
      }

      const { error } = await supabase.from("clients").insert(payload);
      if(error){
        setMsg("Error al guardar: " + error.message);
        return;
      }

      setMsg("Cliente guardado ✅");
      form.reset();
      await loadClients();

    } finally {
      btnSave.disabled = false;
      btnSave.textContent = "Guardar";
    }
  });

  btnLogout.addEventListener("click", async (e) => {
    e.preventDefault();
    await supabase.auth.signOut();
    window.location.href = "login.html";
  });

  if(await requireSession()){
    loadClients();
  }
</script>

</body>
</html>
