<!doctype html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Alpha Avocat</title>

<link rel="stylesheet" href="./style.css">

</head>

<body class="app-shell">


<header class="topbar">

<div class="brand">

<div class="brand-mark">A</div>

<div class="brand-text">

<div class="brand-title">ALPHA AVOCAT</div>

<div class="brand-sub">
Sistema de Gestión Jurídica Inteligente
</div>

</div>

</div>

<div class="topbar-right">

<a class="btn btn-3d btn-primary" href="./login.html">
Ingresar
</a>

</div>

</header>



<div class="layout">


<main class="main">


<section class="card" style="max-width:600px;margin:auto;text-align:center">

<h1 style="margin-bottom:10px">
Sistema de Gestión Jurídica
</h1>

<p class="muted" style="margin-bottom:25px">

Alpha Avocat es un sistema diseñado para la administración
de clientes, causas judiciales y agenda profesional.

</p>


<a class="btn btn-3d btn-primary" href="./login.html">
Ingresar al sistema
</a>


</section>


</main>

</div>



<script type="module">

import { supabase } from "./app.js"


async function verificarSesion(){

limpiarEstadoInicialPublico()

try{

const { data } = await supabase.auth.getSession()

if(data?.session){

window.location.replace("./panel.html")

return

}

}catch(error){

console.error("No fue posible validar la sesión al iniciar.", error)

}

}

function limpiarEstadoInicialPublico(){

document.documentElement.classList.remove(
"session-check-pending",
"loading",
"auth-loading",
"startup",
"intro",
"transition",
"blur",
"overlay",
"pending"
)

document.body.classList.remove(
"session-check-pending",
"session-check-ready",
"loading",
"auth-loading",
"startup",
"intro",
"transition",
"blur",
"overlay",
"pending"
)

for(const selector of ["body",".topbar",".layout",".main",".card"]){
const element = selector === "body" ? document.body : document.querySelector(selector)
if(!element) continue
element.style.opacity = "1"
element.style.filter = "none"
element.style.backdropFilter = "none"
element.style.visibility = "visible"
element.style.pointerEvents = "auto"
}

document.getElementById("startup-loader")?.remove()

}

document.addEventListener("DOMContentLoaded", limpiarEstadoInicialPublico, { once:true })


verificarSesion()

</script>


</body>
</html>
