<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Clientes — Alpha Avocat</title>

<link rel="stylesheet" href="./style.css">

</head>


<body class="app-shell">


<header class="topbar">

<div class="brand">

<div class="brand-mark">A</div>

<div class="brand-text">
<div class="brand-title">ALPHA AVOCAT</div>
<div class="brand-sub">Sistema de Gestión Jurídica Inteligente</div>
</div>

</div>


<div class="topbar-right">

<div class="search">
<input id="search" type="search" placeholder="Buscar cliente">
</div>

<button id="btnNewClient" class="btn btn-3d btn-primary">
Nuevo cliente
</button>

<a class="btn btn-3d btn-secondary" href="./panel.html">
Panel
</a>

</div>

</header>



<div class="layout">


<aside class="sidebar">

<nav class="nav">

<a class="nav-item" href="./panel.html">Panel</a>

<a class="nav-item active" href="./clientes.html">Clientes</a>

<a class="nav-item" href="./causas.html">Causas</a>

<a class="nav-item" href="./agenda.html">Agenda</a>

</nav>

</aside>



<main class="main">



<section class="card">

<div class="card-head">

<h2 class="card-title">Clientes registrados</h2>

</div>



<div class="table-wrap">

<table class="table">

<thead>

<tr>

<th>Nombre</th>

<th>RUT</th>

<th>Teléfono</th>

<th>Email</th>

<th>Tipo</th>

<th>Acciones</th>

</tr>

</thead>

<tbody id="clientesTable">

<tr>

<td colspan="6">Cargando...</td>

</tr>

</tbody>

</table>

</div>

</section>

</main>

</div>



<script type="module">

import { supabase } from './app.js'


const tabla = document.getElementById("clientesTable")


async function cargarClientes(){

const { data , error } = await supabase
.from("clients")
.select("*")
.order("created_at",{ascending:false})

if(error){

tabla.innerHTML = "<tr><td colspan='6'>Error al cargar clientes</td></tr>"
return
}

if(!data.length){

tabla.innerHTML = "<tr><td colspan='6'>Sin clientes</td></tr>"
return
}

tabla.innerHTML = ""

data.forEach(cliente => {

const fila = document.createElement("tr")

fila.innerHTML = `

<td>${cliente.full_name ?? ""}</td>

<td>${cliente.rut ?? ""}</td>

<td>${cliente.phone ?? ""}</td>

<td>${cliente.email ?? ""}</td>

<td>${cliente.is_legal_entity ? "Jurídica" : "Natural"}</td>

<td>

<button class="btn btn-small delete" data-id="${cliente.id}">
Eliminar
</button>

</td>

`

tabla.appendChild(fila)

})

}



document.addEventListener("click", async e=>{

if(e.target.classList.contains("delete")){

const id = e.target.dataset.id

if(confirm("Eliminar cliente?")){

await supabase
.from("clients")
.delete()
.eq("id",id)

cargarClientes()

}

}

})



cargarClientes()

</script>


</body>
</html>
