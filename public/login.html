<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alpha Avocat | Iniciar sesión</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body class="login-page">
  <main class="login-shell">
    <section class="login-card" aria-labelledby="login-title">
      <div class="login-logo-track" aria-hidden="true">
        <img src="./img/logo-alpha-avocat.png" alt="Logo Alpha Avocat" class="login-logo brand-logo-transparent">
      </div>

      <h1 id="login-title">Iniciar sesión</h1>
      <p class="login-subtitle">Accede con tu cuenta para entrar al panel principal.</p>

      <form id="login-form" class="login-form" novalidate>
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" autocomplete="email" required>

        <label for="password">Contraseña</label>
        <input id="password" type="password" autocomplete="current-password" required>

        <div class="login-actions">
          <a class="login-link" href="./reset.html">¿Olvidaste tu contraseña?</a>
          <button id="submit-btn" type="submit">Entrar</button>
        </div>

        <p id="auth-status" class="auth-status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script type="module">
    import { supabase } from "./app.js"

    const form = document.getElementById("login-form")
    const status = document.getElementById("auth-status")
    const submitBtn = document.getElementById("submit-btn")

    function setStatus(message, type = "") {
      status.textContent = message
      status.className = `auth-status ${type}`.trim()
    }

    async function verificarSesion() {
      const { data, error } = await supabase.auth.getSession()

      if (error) {
        setStatus("No se pudo validar la sesión actual.", "error")
        return
      }

      if (data?.session) {
        window.location.href = "./transicion.html"
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault()

      const email = document.getElementById("email").value.trim()
      const password = document.getElementById("password").value

      if (!email || !password) {
        setStatus("Debes completar correo y contraseña.", "error")
        return
      }

      submitBtn.disabled = true
      setStatus("Ingresando...")

      const { error } = await supabase.auth.signInWithPassword({ email, password })

      if (error) {
        submitBtn.disabled = false
        setStatus(error.message || "No fue posible iniciar sesión. Verifica tus credenciales.", "error")
        return
      }

      setStatus("Acceso correcto. Redirigiendo...", "ok")
      window.location.href = "./transicion.html"
    })

    verificarSesion()
  </script>
</body>

</html>
