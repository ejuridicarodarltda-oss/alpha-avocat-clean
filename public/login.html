<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ALPHA AVOCAT - Acceso</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>ALPHA AVOCAT</h1>
  </header>

  <main>
    <div class="card" style="max-width:440px;margin:auto">
      <h2>Acceso al sistema</h2>

      <form id="loginForm">
        <label>Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="contacto@alphaavocat.cl" required />

        <label>Contraseña</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="********" required />

        <button id="btnLogin" type="submit">Ingresar</button>
      </form>

      <p id="msg" class="muted"></p>
    </div>
  </main>

  <script type="module">
    import { supabase } from "./app.js";

    const form = document.getElementById("loginForm");
    const btn = document.getElementById("btnLogin");
    const msg = document.getElementById("msg");

    function setMsg(text) {
      msg.textContent = text || "";
    }

    // Si ya hay sesión, saltar al panel
    (async () => {
      try {
        const { data, error } = await supabase.auth.getSession();
        if (error) {
          setMsg("Error sesión: " + error.message);
          return;
        }
        if (data?.session) window.location.href = "panel.html";
      } catch (e) {
        setMsg("Error inicial: " + (e?.message || String(e)));
      }
    })();

    form.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      setMsg("");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      btn.disabled = true;
      btn.textContent = "Ingresando…";

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
          setMsg("Login falló: " + error.message);
          return;
        }

        if (!data?.session) {
          setMsg("No se recibió sesión. Revisa usuario/contraseña en Supabase.");
          return;
        }

        window.location.href = "panel.html";
      } catch (e) {
        setMsg("Excepción: " + (e?.message || String(e)));
      } finally {
        btn.disabled = false;
        btn.textContent = "Ingresar";
      }
    });
  </script>
</body>
</html>
