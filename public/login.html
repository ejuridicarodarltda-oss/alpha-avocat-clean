<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Alpha Avocat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#1e40af;
color:white;
border:none;
cursor:pointer;
}

.link{
margin-top:10px;
font-size:14px;
cursor:pointer;
color:#1e40af;
}
</style>
</head>

<body>

<div class="box">

<h2>Alpha Avocat</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

<div class="link" onclick="forgot()">Olvidé mi clave</div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://ryekhrwuglpzncktypnx.supabase.co",
"TU_ANON_PUBLIC_KEY"
)

async function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const {error} = await supabase.auth.signInWithPassword({
email:email,
password:password
})

if(error){
alert(error.message)
return
}

window.location.href="/panel.html"

}

async function forgot(){

const email = prompt("Ingrese su correo")

if(!email) return

const {error} = await supabase.auth.resetPasswordForEmail(email,{
redirectTo:"https://alphaavocat.cl/login.html"
})

if(error){
alert(error.message)
}else{
alert("Se envió correo para recuperar contraseña")
}

}

</script>

</body>
</html>
