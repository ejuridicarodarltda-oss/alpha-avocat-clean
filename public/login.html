<!doctype html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ingreso — Alpha Avocat</title>

<link rel="stylesheet" href="./style.css">

</head>


<body class="app-shell">


<header class="topbar">

<div class="brand">

<div class="brand-mark">A</div>

<div class="brand-text">

<div class="brand-title">ALPHA AVOCAT</div>

<div class="brand-sub">
Sistema de Gestión Jurídica Inteligente
</div>

</div>

</div>

</header>



<div class="layout">


<main class="main">


<section class="card" style="max-width:420px;margin:auto">

<h2 style="margin-bottom:18px">Ingreso al sistema</h2>


<div class="field">

<label>Correo electrónico</label>

<input type="email" id="email">

</div>


<div class="field" style="margin-top:10px">

<label>Contraseña</label>

<input type="password" id="password">

</div>


<button id="btnLogin" class="btn btn-3d btn-primary" style="margin-top:16px;width:100%">
Ingresar
</button>


<p id="msg" class="muted" style="margin-top:12px"></p>


<div style="margin-top:18px;text-align:center">

<a href="./reset.html">
¿Olvidó su contraseña?
</a>

</div>


</section>


</main>

</div>



<script type="module">

import { supabase } from "./app.js"



const btn = document.getElementById("btnLogin")

const msg = document.getElementById("msg")



btn.addEventListener("click", async ()=>{


const email = document.getElementById("email").value

const password = document.getElementById("password").value


if(!email || !password){

msg.textContent = "Debe ingresar correo y contraseña"

return

}



const { data, error } = await supabase.auth.signInWithPassword({

email:email,
password:password

})


if(error){

msg.textContent = "Correo o contraseña incorrecta"

return

}



window.location.href = "./panel.html"



})



async function verificarSesion(){

const { data } = await supabase.auth.getSession()

if(data.session){

window.location.href = "./panel.html"

}

}

verificarSesion()

</script>


</body>
</html>
